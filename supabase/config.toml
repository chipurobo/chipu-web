# ChipuRobo dashboard — Supabase local CLI config.
# Most defaults are fine for `supabase start`. After `supabase link` to a
# hosted Cloud project the project_id below becomes irrelevant.

project_id = "chipurobo-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/dashboard",
  "https://chipurobo.com/dashboard"
]
jwt_expiry = 3600

# === Signup is CLOSED. ===
# 20260601000009 moved account creation to admins (create_school_with_lead)
# and removed the self-signup RPC — but GoTrue's /auth/v1/signup endpoint is
# governed by this config, not by that RPC. While it was true, anyone with
# the publishable key could POST to it and receive a live `authenticated`
# JWT, which re-scoped every `to authenticated` policy in the schema from
# "onboarded school staff" to "the public internet".
#
# NOTE: this file configures the LOCAL stack only. The hosted project must
# be changed too — Dashboard → Authentication → Providers → Email → disable
# "Enable email signup" — or via `supabase config push`.
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false

# Edge functions
#
# verify_jwt = true: the platform validates the JWT before the handler runs.
# This previously read `false` on the rationale that the OPTIONS preflight
# needed to reach the handler for CORS — but Supabase answers preflight
# ahead of JWT verification, so nothing was gained, and the handler's own
# check only tested that the Authorization header was PRESENT. Any string
# passed it, making send-email an open relay on a domain with our SPF/DKIM.
# The handler now verifies the token as well; this is belt and braces.
[functions.send-email]
verify_jwt = true
