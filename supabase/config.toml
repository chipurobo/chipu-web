# ChipuRobo dashboard — Supabase local CLI config.
# Most defaults are fine for `supabase start`. After `supabase link` to a
# hosted Cloud project the project_id below becomes irrelevant.

project_id = "chipurobo-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/dashboard",
  "https://chipurobo.com/dashboard"
]
jwt_expiry = 3600
enable_signup = true

# === The decision you locked in: no email verification gate. ===
# Users get a live session the moment `signUp()` completes; we lean on the
# fact that the /dashboard/register-club URL is only shared with schools
# ChipuRobo has already onboarded as code clubs offline.
[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false
