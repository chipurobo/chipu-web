# =============================================================
# GraphQL codegen — typed SDK from your Supabase pg_graphql schema.
#
# How to run:
#   1. Make sure your local Supabase is up: `supabase start`
#   2. Confirm pg_graphql is enabled (it is by default on Supabase
#      hosted projects + the local CLI's default postgres image).
#   3. Make sure .env.local has VITE_SUPABASE_URL and
#      VITE_SUPABASE_PUBLISHABLE_KEY (or the legacy ANON_KEY).
#   4. Run: `npm run codegen`
#
# The CLI reads dotenv automatically.
#
# Output is at src/lib/gql/sdk.ts — a typed function for every
# operation declared in any .graphql file under src/. Import with:
#   import { getSdk } from './lib/gql/sdk';
#   const sdk = getSdk(gqlClient);
#   const data = await sdk.GetLeaderboard();
#
# Until codegen has been run, src/lib/gql/queries.ts holds hand-typed
# template-string queries that mirror the eventual SDK shape, so the
# project builds and runs without depending on a successful introspect.
# =============================================================

schema:
  - "${VITE_SUPABASE_URL}/graphql/v1":
      headers:
        apikey: "${VITE_SUPABASE_PUBLISHABLE_KEY}"
        Authorization: "Bearer ${VITE_SUPABASE_PUBLISHABLE_KEY}"

documents:
  - "src/**/*.graphql"

generates:
  src/lib/gql/sdk.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
    config:
      # Supabase pg_graphql custom scalars
      scalars:
        UUID:     string
        Datetime: string
        Date:     string
        Time:     string
        BigInt:   string
        BigFloat: string
        Cursor:   string
        JSON:     "Record<string, unknown>"
        Opaque:   unknown
      # Use immutable readonly arrays + don't generate __typename by default
      avoidOptionals:
        field: false
        inputValue: false
        object: false
        defaultValue: false
      skipTypename: true
      enumsAsTypes: true

config:
  # Send `application/json` not the codegen default
  noExport: false
