<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/favicon.png" />
    <meta name="description" content="ChipuRobo delivers inclusive AI and robotics education across Kenya. Empowering 4 million youth across Africa by 2030 through hands-on STEM programs, Code Clubs, and sustainable innovation." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />

    <!-- Preconnect to font origins early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>ChipuRobo - Robotics & AI Education</title>

    <!--
      Non-blocking Google Fonts: load with rel="preload" + onload swap
      pattern so the request doesn't block first paint. A <noscript>
      fallback ensures fonts still load when JS is disabled.

      Pixel/robotic stack:
        - Press Start 2P  → big display headings (8-bit)
        - VT323           → body & UI (terminal/CRT, very readable)
        - Share Tech Mono → secondary mono, code/terminal blocks
      Inter & DM Serif Display kept as fallbacks / legacy.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&family=Press+Start+2P&family=Share+Tech+Mono&family=VT323&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&family=Press+Start+2P&family=Share+Tech+Mono&family=VT323&display=swap"
      />
    </noscript>

    <!-- OpenDyslexic: only used by .dyslexic-text elements, load non-blocking -->
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      EmailJS only needed on the Contact page. Defer it so it doesn't
      block the initial render — script will execute after parsing.
    -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
  </body>
</html>
