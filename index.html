<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/favicon.png" />
    <meta name="description" content="ChipuRobo delivers inclusive AI and robotics education across Kenya. Empowering 4 million youth across Africa by 2030 through hands-on STEM programs, Code Clubs, and sustainable innovation." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />

    <!-- Preconnect to font origins early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>ChipuRobo - Robotics & AI Education</title>

    <!--
      Non-blocking Google Fonts: load with rel="preload" + onload swap
      pattern so the request doesn't block first paint. A <noscript>
      fallback ensures fonts still load when JS is disabled.

      Pixel/robotic stack:
        - Press Start 2P  → big display headings (8-bit)
        - VT323           → body & UI (terminal/CRT, very readable)
        - Share Tech Mono → secondary mono, code/terminal blocks
      Inter & DM Serif Display kept as fallbacks / legacy.
    -->
    <!--
      Loaded as a plain stylesheet rather than the preload + onload swap.
      That pattern relies on an inline event-handler attribute, which the
      Content-Security-Policy blocks — under CSP the link would stay a
      preload and the fonts would never apply. display=swap already keeps
      text visible while they load.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&family=Press+Start+2P&family=Share+Tech+Mono&family=VT323&display=swap"
    />

    <!-- OpenDyslexic: only used by .dyslexic-text elements, load non-blocking -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css"
      integrity="sha384-Z+4lSRMBih0T8AB126p/ZLFsykHIs89GwPBrDpIb+cC5W5ppsL+yBh/Y0JDyzb8O"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      The EmailJS CDN script that used to live here has been removed. It was
      loaded on EVERY page — including /dashboard/login and the admin
      screens — from an unpinned major version with no SRI hash, while
      nothing in src/ referenced it (Contact.tsx uses mailto: links, not a
      form). A compromise of that package or of the CDN would have executed
      in the same origin as the dashboard session.
    -->
  </body>
</html>
